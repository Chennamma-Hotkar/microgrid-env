name: microgrid_env
version: 1.0.0
description: AI Custodire Resilience Engine for Next-Gen Microgrids
entry_point: server.app:app
reset_endpoint: /reset
step_endpoint: /step
state_endpoint: /state
tasks_endpoint: /tasks
grade_endpoint: /grade
tasks:
  - id: load_balance
    description: Keep power supply and demand balanced for 20 steps
    difficulty: easy
    max_steps: 20
    reward_range:
      min: 0.0
      max: 1.0
    grader:
      endpoint: /grade
      score_range: [0.0, 1.0]
  - id: fault_recovery
    description: Detect fault at step 6, isolate and restore grid stability
    difficulty: medium
    max_steps: 30
    reward_range:
      min: -1.0
      max: 1.0
    grader:
      endpoint: /grade
      score_range: [0.0, 1.0]
  - id: optimal_dispatch
    description: Minimize cost under variable solar and load for 40 steps
    difficulty: hard
    max_steps: 40
    reward_range:
      min: -1.0
      max: 1.0
    grader:
      endpoint: /grade
      score_range: [0.0, 1.0]
